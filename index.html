<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProxyWarp</title>
  <meta name="description" content="Free anonymous web proxy. No logs." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home">

<main class="home-wrap">

  <div class="home-brand">
    <div class="brand-icon">
      <svg width="12" height="12" viewBox="0 0 18 18" fill="none">
        <path d="M9 1L2 6v6l7 5 7-5V6L9 1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 5v8M5.5 7l3.5 2 3.5-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    ProxyWarp
  </div>

  <form id="main-form" class="home-input-group">
    <div class="home-bar">
      <span class="home-bar-icon">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="2.5" y="5.5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
          <path d="M4.5 5.5V4a2 2 0 014 0v1.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </span>
      <input
        id="url"
        type="text"
        class="home-url"
        placeholder="Enter a URL or search…"
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <button type="submit" class="home-go">
        Go
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6h8M6.5 2.5L10 6l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </form>

</main>

<footer class="home-footer">
  <span style="display:flex;align-items:center;gap:6px">
    <span class="dot dot-green"></span>
    <span>proxywarp.com</span>
  </span>
  <div class="links">
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="donate.html">Donate</a>
    <a href="legal/terms.html">Terms</a>
    <a href="legal/privacy.html">Privacy</a>
    <a href="legal/dmca.html">DMCA</a>
  </div>
</footer>

<script>
document.getElementById('main-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var raw = document.getElementById('url').value.trim();
  if (!raw) return;
  if (!/^https?:\/\//i.test(raw)) {
    if (/^[\w-]+\.[\w.]+/.test(raw)) raw = 'https://' + raw;
    else raw = 'https://duckduckgo.com/html/?q=' + encodeURIComponent(raw);
  }
  window.location.href = 'proxy.html?url=' + encodeURIComponent(raw);
});
</script>

</body>
</html>
