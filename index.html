<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProxyWarp</title>
  <meta name="description" content="Free anonymous web proxy. No logs. Powered by Puter." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home">

<main class="home-wrap">

  <div class="home-brand">
    <div class="brand-icon">
      <svg width="12" height="12" viewBox="0 0 18 18" fill="none">
        <path d="M9 1L2 6v6l7 5 7-5V6L9 1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 5v8M5.5 7l3.5 2 3.5-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    ProxyWarp
  </div>

  <form onsubmit="go(event)" class="home-input-group">
    <div class="home-bar">
      <span class="home-bar-icon">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="2.5" y="5.5" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
          <path d="M4.5 5.5V4a2 2 0 014 0v1.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </span>
      <input
        id="url"
        type="text"
        class="home-url"
        placeholder="Enter a URL or search..."
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <button type="submit" class="home-go">
        Go
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6h8M6.5 2.5L10 6l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="home-opts">
      <label class="toggle-wrap">
        <span class="toggle"><input type="checkbox" id="opt-cookies"/><span class="t-track"></span></span>
        Cookies
      </label>
      <label class="toggle-wrap">
        <span class="toggle"><input type="checkbox" id="opt-scripts" checked/><span class="t-track"></span></span>
        Scripts
      </label>
      <label class="toggle-wrap">
        <span class="toggle"><input type="checkbox" id="opt-ads"/><span class="t-track"></span></span>
        Block ads
      </label>
      <label class="toggle-wrap">
        <span class="toggle"><input type="checkbox" id="opt-encode"/><span class="t-track"></span></span>
        Encrypt URL
      </label>
    </div>
  </form>

</main>

<footer class="home-footer">
  <span style="display:flex;align-items:center;gap:6px">
    <span class="dot dot-green"></span>
    <span>proxywarp.com</span>
  </span>
  <div class="links">
    <a href="legal/terms.html">Terms</a>
    <a href="legal/privacy.html">Privacy</a>
    <a href="legal/dmca.html">DMCA</a>
  </div>
</footer>

<script>
  function go(e) {
    e.preventDefault();
    let raw = document.getElementById('url').value.trim();
    if (!raw) return;

    let url;
    const looksLikeUrl = /^https?:\/\//i.test(raw) || /^[\w-]+\.[\w.]+/.test(raw);
    if (looksLikeUrl) {
      if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
      url = raw;
    } else {
      url = 'https://duckduckgo.com/html/?q=' + encodeURIComponent(raw);
    }

    const enc     = document.getElementById('opt-encode').checked;
    const encoded = enc ? btoa(url) : encodeURIComponent(url);
    const p = new URLSearchParams({
      url:     encoded,
      enc:     enc ? '1' : '0',
      cookies: document.getElementById('opt-cookies').checked ? '1' : '0',
      scripts: document.getElementById('opt-scripts').checked ? '1' : '0',
      ads:     document.getElementById('opt-ads').checked     ? '1' : '0',
    });
    window.location.href = 'proxy.html?' + p;
  }
</script>

</body>
</html>
